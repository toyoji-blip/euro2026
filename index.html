<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>旅行行程 2026</title>
<link rel="manifest" href="manifest-itinerary.json">
<meta name="theme-color" content="#1a1610">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="行程表">
<style>
/* Google Fontsが読み込めない場合のフォールバック付き */
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+JP:wght@400;500;700&display=swap');

:root {
  --ink: #1a1610;
  --rust: #c0533a;
  --gold: #c9a84c;
  --sage: #5a7a6a;
  --slate: #3d4a5c;
  --cream: #f5f0e8;
  --paper: #faf7f0;
  --muted: #8a7e6e;
  --border: #e0d9cc;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  /* システムフォントをフォールバックに追加 */
  font-family: 'Noto Sans JP', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'YuGothic', 'Yu Gothic', Meiryo, sans-serif;
  background: var(--cream);
  color: var(--ink);
  /* スクロール改善 */
  -webkit-overflow-scrolling: touch;
  overflow-x: hidden;
}

/* ===== HEADER ===== */
.header {
  position: sticky;
  top: 0;
  z-index: 50;
  background: var(--ink);
  color: var(--cream);
  padding: 12px 16px;
  padding-top: calc(12px + env(safe-area-inset-top, 0px));
  border-bottom: 2px solid var(--gold);
  display: flex;
  align-items: center;
  gap: 10px;
}

.header-icon { font-size: 1.5rem; flex-shrink: 0; }
.header-text { flex: 1; min-width: 0; }
.header-title {
  font-family: 'Playfair Display', 'Georgia', 'Times New Roman', serif;
  font-size: 1.1rem;
  line-height: 1.2;
}
.header-sub { font-size: 0.65rem; color: var(--gold); letter-spacing: 1px; margin-top: 2px; }

.overview-btn {
  background: var(--gold);
  color: var(--ink);
  border: none;
  border-radius: 20px;
  padding: 7px 14px;
  font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
  font-size: 0.75rem;
  font-weight: 700;
  cursor: pointer;
  flex-shrink: 0;
  letter-spacing: 0.3px;
  /* タッチ操作改善 */
  -webkit-appearance: none;
  touch-action: manipulation;
}

/* ===== LEGEND ===== */
.legend {
  display: flex;
  gap: 14px;
  padding: 7px 16px;
  background: var(--paper);
  border-bottom: 1px solid var(--border);
}
.legend-item { display:flex; align-items:center; gap:5px; font-size:0.68rem; color:var(--muted); }
.ldot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

/* ===== DAY LIST ===== */
.day-list { padding: 10px 12px; padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px)); }

/* ===== DAY CARD ===== */
.day-card {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.day-card.active { border-color: var(--rust); }

.day-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  background: var(--ink);
  color: var(--cream);
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  /* タッチ操作改善 */
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  /* 最小タップ領域を確保 */
  min-height: 56px;
}
.day-card.active .day-header { background: var(--rust); }

.day-num {
  font-family: 'Playfair Display', 'Georgia', serif;
  font-size: 1.5rem;
  font-weight: 700;
  line-height: 1;
  min-width: 32px;
  text-align: center;
  flex-shrink: 0;
}
.day-meta { flex: 1; min-width: 0; }
.day-date { font-size: 0.67rem; letter-spacing: 0.5px; opacity: 0.7; margin-bottom: 2px; }
.day-location {
  font-size: 0.87rem;
  font-weight: 700;
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.chevron {
  font-size: 0.75rem;
  opacity: 0.6;
  transition: transform 0.2s;
  flex-shrink: 0;
}
.day-card.active .chevron { transform: rotate(180deg); }

/* ===== BODY ===== */
.day-body {
  display: none;
  padding: 10px 12px 0;
}
.day-card.active .day-body { display: block; }

.stop-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 7px 0;
  border-bottom: 1px dashed var(--border);
  font-size: 0.82rem;
}
.stop-item:last-child { border-bottom: none; }

.sdot { width:9px; height:9px; border-radius:50%; background:var(--rust); margin-top:4px; flex-shrink:0; }
.sdot.hotel { background: var(--sage); }
.sdot.transit { background: var(--slate); }

.sname { flex:1; line-height:1.4; color:var(--ink); }
.stime { font-size:0.72rem; color:var(--muted); white-space:nowrap; padding-top:2px; }

.action-row {
  display: flex;
  gap: 8px;
  padding: 10px 0 12px;
}

.abtn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 12px 8px;
  border-radius: 10px;
  border: none;
  font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
  font-size: 0.78rem;
  font-weight: 700;
  text-decoration: none;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-appearance: none;
}
.abtn:active { opacity: 0.75; }
.abtn-maps { background: var(--rust); color: white; }

/* ===== SEGMENT ROUTE LINK ===== */
.seg-link-wrap {
  padding: 3px 0 3px 17px;
  display: flex;
  align-items: center;
}
.seg-link {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  text-decoration: none;
  font-size: 0.72rem;
  color: var(--slate);
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 10px 4px 8px;
  touch-action: manipulation;
  transition: background 0.15s, color 0.15s;
}
.seg-link:active { background: var(--slate); color: white; }
.seg-arrow {
  font-size: 0.65rem;
  opacity: 0.6;
  line-height: 1;
}

/* ===== MODAL ===== */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 200;
  align-items: flex-end;
}
.overlay.open { display: flex; }

.modal {
  background: white;
  border-radius: 20px 20px 0 0;
  width: 100%;
  padding: 20px 20px;
  padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px));
  max-height: 88vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.modal-handle {
  width: 36px; height:4px; background:#ccc;
  border-radius:2px; margin:0 auto 16px;
}
.modal-title { font-family:'Playfair Display','Georgia',serif; font-size:1.3rem; margin-bottom:4px; }
.modal-sub { font-size:0.77rem; color:var(--muted); margin-bottom:16px; line-height:1.7; }

.chips { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:20px; }
.chip {
  background: var(--cream);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 11px;
  font-size: 0.75rem;
  color: var(--ink);
}
.chip.hi { background:var(--rust); color:white; border-color:var(--rust); }

.mbtn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-family: 'Noto Sans JP', 'Hiragino Sans', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  text-decoration: none;
  cursor: pointer;
  margin-bottom: 8px;
  touch-action: manipulation;
  -webkit-appearance: none;
}
.mbtn-main { background: var(--rust); color: white; }
.mbtn-close { background: var(--cream); color: var(--muted); }

/* ===== DESKTOP ===== */
@media (min-width: 680px) {
  .header { padding: 16px 24px; }
  .day-list { max-width: 560px; margin: 0 auto; padding: 16px 0 40px; }
  .overlay { align-items: center; }
  .modal { border-radius: 16px; max-width: 460px; margin: auto; }
}
</style>
</head>

function gmUrl(day) {
  if (!day.wp || !day.wp.length) return '#';
  if (day.wp.length === 1) return 'https://maps.google.com/maps?q=' + enc(day.wp[0]);
  var o = enc(day.wp[0]);
  var d = enc(day.wp[day.wp.length-1]);
  var w = day.wp.slice(1,-1).map(enc).join('|');
  var base = 'https://www.google.com/maps/dir/?api=1&origin=' + o + '&destination=' + d;
  if (w) base += '&waypoints=' + w;
  if (day.mode === 'driving' || day.mode === 'walking') base += '&travelmode=' + day.mode;
  return base;
}

// 2地点間のルートURL（区間ナビ用）
function gmSegUrl(from, to, mode) {
  if (!from || !to) return '#';
  var base = 'https://www.google.com/maps/dir/?api=1';
  base += '&origin=' + enc(from);
  base += '&destination=' + enc(to);
  // transitはwaypoints不要なので安全に付与できる
  base += '&travelmode=' + (mode || 'transit');
  return base;
}

function enc(s){ return encodeURIComponent(s); }

        var toShort   = day.wp[i + 1].split(',')[0];
        stopsHtml +=
          '<div class="seg-link-wrap">' +
            '<a class="seg-link" href="' + segUrl + '" target="_blank">' +
              '<span class="seg-arrow">▼</span>' +
              fromShort + ' → ' + toShort +
            '</a>' +
          '</div>';
      }
    }

    var card = document.createElement('div');
    card.className = 'day-card';
    card.id = 'c' + day.id;
    card.innerHTML =
      '<div class="day-header" onclick="toggle(' + day.id + ')">' +
        '<div class="day-num">' + day.id + '</div>' +
        '<div class="day-meta">' +
          '<div class="day-date">' + day.date + ' ' + day.emoji + '</div>' +
          '<div class="day-location">' + day.loc + '</div>' +
        '</div>' +
        '<div class="chevron">▼</div>' +
      '</div>' +
      '<div class="day-body">' +
        stopsHtml +
        '<div class="action-row">' +
          '<a class="abtn abtn-maps" href="' + url + '" target="_blank">📍 1日の全行程をマップで確認</a>' +
        '</div>' +
      '</div>';
    container.appendChild(card);
  });
}

function toggle(id) {
  var card = document.getElementById('c' + id);
  if (!card) return;
  var wasActive = card.classList.contains('active');
  document.querySelectorAll('.day-card.active').forEach(function(c) {
    c.classList.remove('active');
  });
  if (!wasActive) {
    card.classList.add('active');
    setTimeout(function() {
      card.scrollIntoView({behavior:'smooth', block:'nearest'});
    }, 60);
  }
}

var ovWp = ["Tokyo Japan","Geneva Switzerland","Martigny Switzerland","Zermatt Switzerland","Courmayeur Italy","Chamonix France","Manchester UK","Keswick UK","Penzance UK","Exeter UK","Plymouth UK","Santander Spain","Bilbao Spain","Pamplona Spain","Zaragoza Spain","Madrid Spain","Faro Portugal"];
var ovLabels = ["東京","ジュネーブ","マルティニー","ツェルマット","クールマイユール","シャモニー","マンチェスター","ケズィック","ペンザンス","エクセター","プリマス","サンタンデール","ビルバオ","パンプローナ","サラゴサ","マドリード","ファロ🎉"];

function openModal() {
  var chipsEl = document.getElementById('chips');
  if (chipsEl) {
    chipsEl.innerHTML = ovLabels.map(function(l, i) {
      return '<div class="chip' + (i === ovLabels.length - 1 ? ' hi' : '') + '">' + l + '</div>';
    }).join('');
  }
  var o = enc(ovWp[0]);
  var d = enc(ovWp[ovWp.length-1]);
  var w = ovWp.slice(1,-1).map(enc).join('|');
  var btn = document.getElementById('gmap-btn');
  if (btn) btn.href = 'https://www.google.com/maps/dir/?api=1&origin=' + o + '&destination=' + d + '&waypoints=' + w + '&travelmode=transit';
  var overlay = document.getElementById('overlay');
  if (overlay) overlay.classList.add('open');
}

function closeModal() {
  var overlay = document.getElementById('overlay');
  if (overlay) overlay.classList.remove('open');
}

function bgClose(e) {
  var overlay = document.getElementById('overlay');
  if (e.target === overlay) closeModal();
}

// DOMが確実に準備できてから実行
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', renderDays);
} else {
  renderDays();
}
  if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/Euro2026/sw.js');
  });
}
